<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distance Notes</title>
<style>
/* Общие стили и фон */
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #fff0f5;
    background-image: 
        linear-gradient(90deg, rgba(255,182,193,0.1) 1px, transparent 1px),
        linear-gradient(rgba(255,182,193,0.1) 1px, transparent 1px);
    background-size: 30px 30px;
    color: #333;
    overflow-x: hidden;
}

/* Контейнер */
.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 50px 20px;
}

/* Секция */
section {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin-bottom: 80px;
    text-align: center;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease-out;
    background: rgba(255,255,255,0.8);
    border-radius: 20px;
    padding: 30px 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

section.visible {
    opacity: 1;
    transform: translateY(0);
}

/* Изображения */
.art-image {
    max-width: 100%;
    height: auto;
    border-radius: 15px;
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.1));
    transition: transform 0.3s ease;
    cursor: pointer;
}

.art-image:hover {
    transform: scale(1.03) rotate(0.5deg);
}

/* Подписи */
.label {
    margin-top: 15px;
    font-style: italic;
    color: #ff4d6d;
    font-size: 1.1rem;
}

/* Пульсация сердечка */
@keyframes heartbeat {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
}

.heart-icon {
    color: #ff4d6d;
    font-size: 2.2rem;
    display: inline-block;
    animation: heartbeat 1.5s infinite;
    margin-top: 15px;
}

/* Навигация (точки справа) */
.nav-dots {
    position: fixed;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 100;
}

.dot {
    width: 14px;
    height: 14px;
    background: #ffb6c1;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.3s, background 0.3s;
}

.dot:hover {
    transform: scale(1.3);
    background: #ff4d6d;
}

/* Адаптив */
@media (max-width: 600px) {
    background-size: 20px 20px;
    section {
        padding: 25px 15px;
        border-radius: 15px;
    }
    .art-image {
        border-radius: 10px;
    }
}
</style>
</head>
<body>

<div class="nav-dots">
    <div class="dot" onclick="scrollToSection('sec1')"></div>
    <div class="dot" onclick="scrollToSection('sec2')"></div>
    <div class="dot" onclick="scrollToSection('sec3')"></div>
</div>

<div class="container">
    <section id="sec1">
        <img src="cat.jpg" alt="Даже на расстоянии" class="art-image">
        <p class="label">Ты ближе всех, даже когда далеко.</p>
    </section>

    <section id="sec2">
        <img src="scheme.jpg" alt="Я хочу видеть" class="art-image">
        <p class="label">Твоя улыбка — это всё.</p>
    </section>

    <section id="sec3">
        <img src="list.jpg" alt="Любить, верить" class="art-image">
        <div class="heart-icon">❤</div>
        <p class="label">Я тебя люблю.</p>
    </section>
</div>

<script>
// Появление элементов при скролле
const observerOptions = { threshold: 0.3 };
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
    });
}, observerOptions);

document.querySelectorAll('section').forEach(section => observer.observe(section));

// Плавный скролл по точкам
function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
